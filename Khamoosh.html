<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>خدمات پناهندگان سرفراز</title>
                <style>
                        body {
                                    font-family: 'Tahoma', Arial, sans-serif;
                                                margin: 0;
                                                            padding: 0;
                                                                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                                                                                    min-height: 100vh;
                                                                                                display: flex;
                                                                                                            justify-content: center;
                                                                                                                        align-items: center;
                                                                                                                                }
                                                                                                                                        .container {
                                                                                                                                                    background: white;
                                                                                                                                                                border-radius: 20px;
                                                                                                                                                                            padding: 50px;
                                                                                                                                                                                        text-align: center;
                                                                                                                                                                                                    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                                                                                                                                                                                                                max-width: 600px;
                                                                                                                                                                                                                            margin: 20px;
                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                            h1 {
                                                                                                                                                                                                                                                        color: #667eea;
                                                                                                                                                                                                                                                                    font-size: 2.5em;
                                                                                                                                                                                                                                                                                margin-bottom: 20px;
                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                p {
                                                                                                                                                                                                                                                                                                            color: #555;
                                                                                                                                                                                                                                                                                                                        font-size: 1.2em;
                                                                                                                                                                                                                                                                                                                                    line-height: 1.6;
                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                    .button {
                                                                                                                                                                                                                                                                                                                                                                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                                                                                                                                                                                                                                                                                                                                                                            color: white;
                                                                                                                                                                                                                                                                                                                                                                                        padding: 12px 30px;
                                                                                                                                                                                                                                                                                                                                                                                                    border: none;
                                                                                                                                                                                                                                                                                                                                                                                                                border-radius: 30px;
                                                                                                                                                                                                                                                                                                                                                                                                                            font-size: 1.1em;
                                                                                                                                                                                                                                                                                                                                                                                                                                        cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                                                                                                    margin-top: 20px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                display: inline-block;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            text-decoration: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .button:hover {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        transform: translateY(-2px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="container">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h1>خدمات پناهندگان سرفراز</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p>به سایت رسمی خدمات پناهندگان سرفراز خوش آمدید</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <p>ما اینجا هستیم تا به شما کمک کنیم.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <a href="#" class="button">تماس با ما</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
